        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            backdrop-filter: blur(20px);
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .waveform-bar {
            width: 4px;
            background: #4edea3;
            border-radius: 2px;
            box-shadow: 0 0 10px rgba(78, 222, 163, 0.5);
        }
        /* Static simulation of animation via height variety */
        .bar-1 { height: 24px; opacity: 0.4; }
        .bar-2 { height: 48px; opacity: 0.6; }
        .bar-3 { height: 32px; opacity: 0.8; }
        .bar-4 { height: 64px; opacity: 1; }
        .bar-5 { height: 40px; opacity: 0.8; }
        .bar-6 { height: 56px; opacity: 0.6; }
        .bar-7 { height: 28px; opacity: 0.4; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-hidden">
<!-- TopAppBar -->
<header class="w-full top-0 sticky bg-surface/50 dark:bg-surface/50 backdrop-blur-xl border-b border-surface-variant/30 shadow-2xl z-50">
<div class="flex justify-between items-center px-container-margin-mobile py-4 w-full backdrop-blur-md">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim" data-icon="cloud">cloud</span>
<h1 class="font-display-lg text-display-lg-mobile text-primary dark:text-primary-fixed-dim drop-shadow-[0_0_8px_rgba(78,222,163,0.5)]">FinTrack</h1>
</div>
<div class="flex gap-4 items-center">
<span class="material-symbols-outlined text-on-surface-variant/70 active:scale-95 transition-transform cursor-pointer" data-icon="account_circle">account_circle</span>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-container-margin-mobile relative">
<!-- Background Atmospheric Auras -->
<div class="absolute top-1/4 left-1/2 -translate-x-1/2 w-[300px] h-[300px] bg-primary/20 rounded-full blur-[100px] -z-10"></div>
<div class="absolute bottom-1/4 left-1/3 w-[200px] h-[200px] bg-secondary/10 rounded-full blur-[80px] -z-10"></div>
<!-- Mode Indicator -->
<div class="mb-stack-lg flex flex-col items-center gap-2">
<span class="font-label-sm text-label-sm uppercase tracking-widest text-primary/80">Voice Input Active</span>
<div class="h-1 w-12 bg-primary rounded-full shadow-[0_0_8px_rgba(78,222,163,0.8)]"></div>
</div>
<!-- Voice Interaction Center -->
<div class="flex flex-col items-center gap-stack-lg w-full max-w-md">
<!-- Glowing Microphone -->
<div class="relative group">
<div class="absolute inset-0 bg-primary/30 rounded-full blur-3xl group-hover:bg-primary/40 transition-all duration-700"></div>
<button class="relative w-32 h-32 rounded-full bg-primary flex items-center justify-center shadow-[0_0_50px_rgba(78,222,163,0.6)] border-4 border-white/20 active:scale-90 transition-all duration-300">
<span class="material-symbols-outlined text-on-primary !text-[48px]" data-icon="mic" data-weight="fill" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>
</div>
<!-- Waveform Visualization -->
<div class="flex items-center gap-2 h-24 mb-stack-md">
<div class="waveform-bar bar-1"></div>
<div class="waveform-bar bar-2"></div>
<div class="waveform-bar bar-3"></div>
<div class="waveform-bar bar-4"></div>
<div class="waveform-bar bar-5"></div>
<div class="waveform-bar bar-6"></div>
<div class="waveform-bar bar-7"></div>
<div class="waveform-bar bar-6"></div>
<div class="waveform-bar bar-5"></div>
<div class="waveform-bar bar-4"></div>
<div class="waveform-bar bar-3"></div>
<div class="waveform-bar bar-2"></div>
<div class="waveform-bar bar-1"></div>
</div>
<!-- Transcription Card -->
<div class="glass-card w-full p-stack-md rounded-xl shadow-2xl relative overflow-hidden">
<div class="absolute top-0 left-0 w-1 h-full bg-primary/50"></div>
<p class="font-body-lg text-body-lg text-on-surface leading-relaxed italic">
                    "I just spent <span class="text-primary font-numeric-data">$45.50</span> on office supplies at <span class="text-primary-fixed-dim font-bold">Staples</span>..."
                </p>
<div class="flex justify-end mt-stack-sm">
<span class="text-primary/40 animate-pulse font-label-sm text-label-sm">Listening...</span>
</div>
</div>
</div>
<!-- Quick Action Buttons -->
<div class="mt-stack-lg flex gap-4 w-full max-w-md">
<button class="flex-1 glass-card py-4 rounded-xl flex items-center justify-center gap-2 hover:bg-surface-bright/20 transition-all active:scale-95">
<span class="material-symbols-outlined text-primary" data-icon="document_scanner">document_scanner</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest text-on-surface">Scan Receipt</span>
</button>
<button class="flex-1 glass-card py-4 rounded-xl flex items-center justify-center gap-2 hover:bg-surface-bright/20 transition-all active:scale-95">
<span class="material-symbols-outlined text-primary" data-icon="edit_note">edit_note</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest text-on-surface">Manual Entry</span>
</button>
</div>
</main>
<!-- BottomNavBar (Suppressed for focused task, but kept placeholder structure for shell consistency if needed elsewhere) -->
<!-- Applying Active State Logic: 'Add' would be active if we were on a main dashboard, but here we prioritize focus -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-end pb-6 pt-2 px-4 bg-surface-container/40 dark:bg-surface-container/40 backdrop-blur-2xl border-t border-white/10 shadow-[0_-10px_40px_rgba(0,0,0,0.5)] rounded-t-xl">
<a class="flex flex-col items-center justify-center text-on-surface-variant/50 dark:text-on-surface-variant/50 hover:text-primary-fixed transition-colors active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="account_balance_wallet">account_balance_wallet</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest mt-1">Wealth</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant/50 dark:text-on-surface-variant/50 hover:text-primary-fixed transition-colors active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="query_stats">query_stats</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest mt-1">Analysis</span>
</a>
<a class="flex flex-col items-center justify-center text-primary dark:text-primary-fixed-dim drop-shadow-[0_0_12px_rgba(78,222,163,0.6)] active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined !text-4xl" data-icon="add_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">add_circle</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest mt-1">Add</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant/50 dark:text-on-surface-variant/50 hover:text-primary-fixed transition-colors active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="trending_up">trending_up</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest mt-1">Markets</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant/50 dark:text-on-surface-variant/50 hover:text-primary-fixed transition-colors active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest mt-1">Settings</span>
</a>
</nav>

</div>
