name: fcc_app
description: "Financial Command Center (FCC) - A premium, offline-first personal & business financial operating system."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Offline-first SQLite Database
  sqflite: ^2.3.0
  sqflite_common_ffi_web: ^0.4.5
  path: ^1.8.3

  # Unique Utilities
  uuid: ^4.3.3
  intl: ^0.19.0
  cupertino_icons: ^1.0.6
  encrypt: ^5.0.3
  crypto: ^3.0.3
  local_auth: ^2.2.0

  # Data Visualization (Interactive ECharts bridge)
  graphify: any

  # Premium Typography — Inter font
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
